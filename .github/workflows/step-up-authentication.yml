name: step-up-authentication

on:
  push:
    paths:
      - 'step-up-authentication/**'
      - '.github/workflows/step-up-authentication.yml'
  pull_request:
    branches: [main]
    paths:
      - 'step-up-authentication/**'
      - '.github/workflows/step-up-authentication.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: step-up-authentication
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Run tests
        run: ./gradlew test

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: step-up-authentication
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Build
        run: ./gradlew build
