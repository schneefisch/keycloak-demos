name: custom-spi-permission-mapper

on:
  push:
    paths:
      - 'custom-spi-permission-mapper/**'
      - '.github/workflows/custom-spi-permission-mapper.yml'
  pull_request:
    branches: [main]
    paths:
      - 'custom-spi-permission-mapper/**'
      - '.github/workflows/custom-spi-permission-mapper.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: custom-spi-permission-mapper
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Run tests
        run: ./gradlew test

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: custom-spi-permission-mapper
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Build SPI JAR
        run: ./gradlew shadowJar
      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: custom-spi-permission-mapper-jar
          path: custom-spi-permission-mapper/build/libs/*.jar
          retention-days: 7
